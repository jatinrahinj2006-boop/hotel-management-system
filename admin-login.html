<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aurum Hotels — Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --admin-bg: #0f1115;
      --admin-card: #161920;
      --admin-border: rgba(255,255,255,0.08);
      --admin-text: #f5f5f5;
      --admin-muted: #9aa3b2;
      --admin-gold: #c9a94e;
      --admin-gold-hover: #d4b55a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--admin-bg);
      color: var(--admin-text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
    }

    .login-card {
      background: var(--admin-card);
      border: 1px solid var(--admin-border);
      border-radius: 16px;
      padding: 40px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 500;
      color: var(--admin-gold);
      margin-bottom: 8px;
    }

    .login-subtitle {
      font-size: 14px;
      color: var(--admin-muted);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      color: var(--admin-muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      color: var(--admin-text);
      border: 1px solid var(--admin-border);
      font-size: 15px;
      transition: all 0.2s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: rgba(201, 169, 78, 0.4);
    }

    .login-btn {
      width: 100%;
      padding: 14px 24px;
      border-radius: 10px;
      background: var(--admin-gold);
      color: #000;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 8px;
    }

    .login-btn:hover {
      background: var(--admin-gold-hover);
      transform: translateY(-1px);
    }

    .login-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .error-message {
      color: #e74c3c;
      font-size: 14px;
      text-align: center;
      margin-top: 16px;
      min-height: 20px;
    }

    .brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand-logo {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      color: var(--admin-gold);
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="brand">
      <div class="brand-logo">AURUM</div>
    </div>

    <div class="login-card">
      <div class="login-header">
        <h1 class="login-title">Admin Login</h1>
        <p class="login-subtitle">Enter your credentials to access the dashboard</p>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input 
            type="email" 
            id="email" 
            class="form-input" 
            placeholder="admin@aurum.com"
            required
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            class="form-input" 
            placeholder="••••••"
            required
            autocomplete="current-password"
          />
        </div>

        <button type="submit" class="login-btn" id="login-btn">Sign In</button>

        <div class="error-message" id="error-message"></div>
      </form>
    </div>
  </div>

  <script>
    const API = 'http://localhost:3000/api';

    const loginForm = document.getElementById('login-form');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('login-btn');
    const errorMessage = document.getElementById('error-message');

    // Check if already logged in
    const token = localStorage.getItem('adminToken');
    if (token) {
      window.location.href = 'admin.html';
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      if (!email || !password) {
        errorMessage.textContent = 'Please enter both email and password';
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in...';
      errorMessage.textContent = '';

      try {
        const response = await fetch(`${API}/admin/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          // Store token
          localStorage.setItem('adminToken', data.token);
          // Redirect to admin dashboard
          window.location.href = 'admin.html';
        } else {
          errorMessage.textContent = data.error || 'Invalid credentials';
          loginBtn.disabled = false;
          loginBtn.textContent = 'Sign In';
        }
      } catch (err) {
        errorMessage.textContent = 'Network error. Please try again.';
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
